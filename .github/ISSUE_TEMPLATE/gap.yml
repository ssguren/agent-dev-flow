name: Gap — 需求对齐
description: 记录产品需求与技术设计之间的分歧，推动决策落地
labels: ["gap", "raised"]
body:
  - type: markdown
    attributes:
      value: |
        **填写说明**：描述你发现的需求与现有设计之间的不一致。不需要有技术答案，BE 会在分析后回复。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 需求意图是什么？和现有设计哪里对不上？
      placeholder: 例如：PR 中要求支持 Email 注册，但当前后端只有微信和 Google 登录，没有密码体系
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: 影响范围
      description: 涉及哪些功能模块、哪个 Sprint？
      placeholder: 例如：影响 Sprint 1 的用户注册流程，涉及 auth 域
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      description: 这个问题不解决，会阻塞哪个阶段的工作？
      options:
        - high（阻塞当前 Sprint 开发）
        - medium（影响后续 Sprint，需尽快确认）
        - low（不紧急，但需要最终决策）
    validations:
      required: true

  - type: textarea
    id: expectation
    attributes:
      label: 期望决策方向
      description: PM 倾向的方向，或者需要 BE 提供哪些信息才能做决策？
      placeholder: 例如：倾向不做 Email 注册，但需要 BE 确认对 Adobe 账号打通是否有影响
    validations:
      required: false

  - type: input
    id: source
    attributes:
      label: 来源文档
      description: 哪份需求文档或 PR 触发了这个 Gap？
      placeholder: 例如：high-level-PR.md §3.2 用户注册
    validations:
      required: false
